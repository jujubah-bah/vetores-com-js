<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <style>
            body{
                text-align: center;
            }

            button{
                background-color: blueviolet;
                color: white;
                border-radius: 5px;
                cursor:pointer;
                border: none;
                height: 30px;
                width: 200px;

            }
            button:hover{
                background-color: blueviolet;
            }
            #ultimoitem{
                color:aquamarine
            }
          

        </style>
    </head>
    <body>
        <h1>🎁SORTEIO DE CAIXA PREMIADA🎁</h1>
        <button onclick="abrircaixa()">Abrir caixa</button>
        <button onclick="mostrarinventario()">mostrar items</button>
         
        <h2 id="ultimoitem"></h2>
        <ul id=colecao></ul>

        <script>
            let itenspossiveis = [
                "🔑chaveiro",
                "📿pulseira",
                "💎colar",
                "💠brinco",
                "💍anel",
                "🪪carteira",
                "🪫carregador",
                "🎧fone de ouvido"
            ]

            // vetor que armazena os itens obtidos pelo jogador 
            let inventario = []

         function abrircaixa(){
            // sorteia um número entre 0 e sete
            sorteado = Math.floor(Math.random() * itenspossiveis.length)
        
            // pegar o item da posição sorteada
            let item = itenspossiveis[sorteado];

            // adiciona o item no inventario
            inventario.push(item);

            // mostrar o item na tela
            document.getElementById("ultimoitem").innerHTML = "Você recebeu: " + item;

         }

         function mostrarinventario(){
            let lista = document.getElementById("colecao");
            
            // limpar a lista
            lista.innerHTML = "";

            //percorre o vetor inventario e mostra na tela
            for(let i = 0; i < inventario.length; i++){
            lista.innerHTML += 
            "<li>" +
            (i + 1)  + "° item: " + inventario[i] +
            "</li>";
            }
         }
         

        </script>
    </body>
</html>
